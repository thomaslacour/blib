{{ with .Site.Params.banner }}
<style>
  :root {
    --banner-image: url("{{ . }}");
  }
  #banner {
    background-image: -moz-linear-gradient(top, rgba(0,0,0,0.5), rgba(0,0,0,0.5)), var(--banner-image) !important;
    background-image: -webkit-linear-gradient(top, rgba(0,0,0,0.5), rgba(0,0,0,0.5)), var(--banner-image) !important;
    background-image: -ms-linear-gradient(top, rgba(0,0,0,0.5), rgba(0,0,0,0.5)), var(--banner-image) !important;
    background-image: linear-gradient(top, rgba(0,0,0,0.5), rgba(0,0,0,0.5)), var(--banner-image) !important;
    background-size: cover;
    background-position: center center;
  }
  #main > header {
    background-image: -moz-linear-gradient(top, rgba(0,0,0,0.5), rgba(0,0,0,0.5)), var(--banner-image) !important;
    background-image: -webkit-linear-gradient(top, rgba(0,0,0,0.5), rgba(0,0,0,0.5)), var(--banner-image) !important;
    background-image: -ms-linear-gradient(top, rgba(0,0,0,0.5), rgba(0,0,0,0.5)), var(--banner-image) !important;
    background-image: linear-gradient(top, rgba(0,0,0,0.5), rgba(0,0,0,0.5)), var(--banner-image) !important;
  }
  body.landing #page-wrapper {
    background-image: -moz-linear-gradient(top, rgba(0,0,0,0.5), rgba(0,0,0,0.5)), var(--banner-image) !important;
    background-image: -webkit-linear-gradient(top, rgba(0,0,0,0.5), rgba(0,0,0,0.5)), var(--banner-image) !important;
    background-image: -ms-linear-gradient(top, rgba(0,0,0,0.5), rgba(0,0,0,0.5)), var(--banner-image) !important;
    background-image: linear-gradient(top, rgba(0,0,0,0.5), rgba(0,0,0,0.5)), var(--banner-image) !important;
  }
  body.is-mobile.landing #banner,
  body.is-mobile.landing .wrapper.style4 {
    background-image: -moz-linear-gradient(top, rgba(0,0,0,0.5), rgba(0,0,0,0.5)), var(--banner-image) !important;
    background-image: -webkit-linear-gradient(top, rgba(0,0,0,0.5), rgba(0,0,0,0.5)), var(--banner-image) !important;
    background-image: -ms-linear-gradient(top, rgba(0,0,0,0.5), rgba(0,0,0,0.5)), var(--banner-image) !important;
    background-image: linear-gradient(top, rgba(0,0,0,0.5), rgba(0,0,0,0.5)), var(--banner-image) !important;
  }
</style>
{{ end }}
